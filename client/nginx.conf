# ============================================
# Nginx Configuration for React SPA
# ============================================
# This configuration enables Single Page Application (SPA) routing
# and optimizes performance with caching and compression

server {
    # Listen on port 80 for HTTP traffic
    listen 80;
    server_name localhost;

    # Set the root directory where static files are served from
    # This is where the React build output (dist/) is copied in the Dockerfile
    root /usr/share/nginx/html;
    
    # Default file to serve when accessing a directory
    index index.html;

    # Enable gzip compression for faster transfers
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # ============================================
    # SPA Fallback - Critical for React Router
    # ============================================
    # Problem: React Router handles client-side routing (/dashboard, /profile, etc.)
    # These routes don't exist as files on the server.
    # 
    # Solution: Try to serve the requested file. If it doesn't exist,
    # serve index.html instead. React will load and handle the routing.
    #
    # Flow:
    # 1. User visits /dashboard in a new tab or refreshes
    # 2. Browser requests /dashboard from server
    # 3. Nginx tries to find /dashboard as a file - doesn't exist
    # 4. Nginx serves index.html (the React app)
    # 5. React loads and React Router recognizes /dashboard
    # 6. Dashboard component is rendered
    location / {
        # try_files attempts to serve files in this order:
        # $uri         - Try the exact file requested (e.g., /assets/main.js)
        # $uri/        - Try as a directory with index file
        # /index.html  - If neither exists, serve index.html (React Router takes over)
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Static Asset Caching
    # ============================================
    # Cache static assets (JS, CSS, images, fonts) for long periods
    # Safe because Vite uses hashed filenames (e.g., main.abc123.js)
    # A new build gets new hashed filenames, so old cached files never cause issues
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Cache for 1 year
        expires 1y;
        
        # Tell browsers and CDNs to cache aggressively
        add_header Cache-Control "public, immutable";
        
        # Add ETag for additional validation
        add_header ETag "\"permanent\"";
    }

    # ============================================
    # HTML Caching Policy
    # ============================================
    # Never cache index.html - it's the entry point
    # Users must always fetch the latest version
    # Otherwise, they could get stuck on old versions after you deploy
    location = /index.html {
        # Don't cache - always fetch fresh
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        # Also set expires to past date for older browsers
        add_header Expires "0";
        
        # Tell proxies not to cache
        add_header Pragma "no-cache";
    }

    # ============================================
    # Security Headers
    # ============================================
    # These headers improve security and performance
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # Deny Access to Sensitive Files
    # ============================================
    # Prevent access to hidden files and directories
    location ~ /\. {
        deny all;
    }

    # ============================================
    # 404 Handling
    # ============================================
    # For any missing files that aren't caught by SPA routing,
    # serve index.html so React can handle the 404
    error_page 404 /index.html;
}

