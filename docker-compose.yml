version: '3.9'

services:
  # Node.js Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: creators-platform-backend
    ports:
      - "5000:5000"
    environment:
      # Node environment
      NODE_ENV: production
      PORT: 5000
      
      # MongoDB Connection
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/creators-platform}
      
      # JWT Secret
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      
      # Cloudinary Configuration
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    
    # Restart policy - restart on failure
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => { if (res.statusCode !== 200) throw new Error(res.statusCode) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Volume for logs (optional)
    volumes:
      - ./logs:/app/logs
    
    # Dependency: Wait for MongoDB to start
    depends_on:
      mongo:
        condition: service_started
    
    # Network
    networks:
      - creators-network

  # MongoDB Service
  mongo:
    image: mongo:7-alpine
    container_name: creators-platform-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: creators-platform
      # Optional: Add credentials
      # MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      # MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - creators-network

# Volumes for persistent data
volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local

# Network for service communication
networks:
  creators-network:
    driver: bridge
